services:
  postgres:
    image: postgres:16
    container_name: discord-anthropologist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-discord_anthropologist}
      POSTGRES_USER: ${POSTGRES_USER:-discord}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-discord}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-discord} -d ${POSTGRES_DB:-discord_anthropologist}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/transcription-api/Dockerfile
      args:
        PYTORCH_INDEX_URL: ${PYTORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    container_name: discord-anthropologist-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-discord}:${POSTGRES_PASSWORD:-discord}@postgres:5432/${POSTGRES_DB:-discord_anthropologist}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-pt}
      WHISPER_BEAM_SIZE: ${WHISPER_BEAM_SIZE:-5}
      WHISPER_INITIAL_PROMPT: ${WHISPER_INITIAL_PROMPT:-}
      WHISPER_CARRY_INITIAL_PROMPT: ${WHISPER_CARRY_INITIAL_PROMPT:-false}
      WHISPER_CONDITION_ON_PREVIOUS_TEXT: ${WHISPER_CONDITION_ON_PREVIOUS_TEXT:-true}
      UPLOAD_TMP_DIR: ${UPLOAD_TMP_DIR:-.tmp/uploads}
      RECORDINGS_DIR: /app/recordings
      KEEP_UPLOADS: ${KEEP_UPLOADS:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-${GROQ_API_KEY:-}}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-${GROQ_BASE_URL:-https://api.openai.com/v1}}
      OPENAI_MODEL: ${OPENAI_MODEL:-${GROQ_MODEL:-gpt-4o-mini}}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      PROFILE_DOCS_PROVIDER: ${PROFILE_DOCS_PROVIDER:-local}
      LOCAL_PROFILE_DIR: ${LOCAL_PROFILE_DIR:-/app/profiles}
      TEXT_PROFILE_SYNC_ENABLED: ${TEXT_PROFILE_SYNC_ENABLED:-true}
      TEXT_PROFILE_SYNC_INTERVAL_HOURS: ${TEXT_PROFILE_SYNC_INTERVAL_HOURS:-12}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src
      - ./discord_bot/recordings:/app/recordings
      - ./profiles:/app/profiles
      - api_uploads:/app/.tmp/uploads
      - whisper_cache:/root/.cache/whisper
    depends_on:
      postgres:
        condition: service_healthy

  discord-bot:
    build:
      context: .
      dockerfile: discord_bot/Dockerfile
    container_name: discord-anthropologist-bot
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:?DISCORD_TOKEN is required}
      DISCORD_APP_ID: ${DISCORD_APP_ID:?DISCORD_APP_ID is required}
      TRANSCRIPTION_API_URL: http://api:8000
      TRANSCRIPTION_API_TIMEOUT: ${TRANSCRIPTION_API_TIMEOUT:-10m}
      SESSION_SUMMARY_TIMEOUT: ${SESSION_SUMMARY_TIMEOUT:-15m}
    volumes:
      - ./discord_bot/recordings:/app/recordings
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  api_uploads:
  whisper_cache:
